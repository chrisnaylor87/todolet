# Flathub manifest for Todolet.
#
# To submit: push the repo to GitHub, tag v1.0.0, fill in OWNER and the
# sha256 below (curl -L <url> | sha256sum), then follow
# https://docs.flathub.org/docs/for-app-authors/submission
# (PR against https://github.com/flathub/flathub adding this file).
#
# Test locally with:
#   flatpak-builder --user --install --force-clean build app.todolet.Todolet.yaml
#   flatpak run app.todolet.Todolet

app-id: app.todolet.Todolet
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: todolet
finish-args:
  # import/export/ical read and write user-named files; no network, no display
  - --filesystem=home
modules:
  - name: todolet
    buildsystem: simple
    build-commands:
      - install -Dm755 todolet /app/bin/todolet
      - install -Dm644 packaging/flathub/app.todolet.Todolet.metainfo.xml
        /app/share/metainfo/app.todolet.Todolet.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/OWNER/todolet-linux/archive/refs/tags/v1.0.0.tar.gz
        sha256: FILL_IN_AFTER_TAGGING
